# Support Ticket Schema — no PII
# Defines ticket types, priority levels, and SLA targets.

ticket_types:
  - billing_inquiry
  - technical_issue
  - account_access
  - feature_request
  - data_export
  - cancellation

priorities:
  p1:
    label: Critical
    first_response_hours: 1
    resolution_hours: 4
  p2:
    label: High
    first_response_hours: 4
    resolution_hours: 24
  p3:
    label: Normal
    first_response_hours: 24
    resolution_hours: 72
  p4:
    label: Low
    first_response_hours: 48
    resolution_hours: 168

escalation:
  auto_escalate_after_hours: 2
  escalation_channel: "#support-escalations"
  on_call_rotation: true

statuses:
  - open
  - in_progress
  - pending_customer
  - resolved
  - closed
